name: leaguetastic
description: "A Flutter app for weekly cycling segment challenges."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.2.0
  url_launcher: ^6.3.0
  app_links: ^7.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_polyline_points: ^2.0.0
  flutter_map_cache: ^1.5.2
  dio_cache_interceptor: ^3.5.1
  provider: ^6.1.5+1
  shared_preferences: ^2.2.3
  geolocator: ^13.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
